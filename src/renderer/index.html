<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>krit</title>
  <link rel="stylesheet" href="../../node_modules/xterm/css/xterm.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
    }

    .window {
      width: 100vw;
      height: 100vh;
      background: #0d0e12;
      border: 0.5px solid rgba(255, 255, 255, 0.07);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .titlebar {
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      -webkit-app-region: drag;
      flex-shrink: 0;
      border-bottom: 0.5px solid rgba(255, 255, 255, 0.05);
    }

    .titlebar-left {
      display: flex;
      align-items: center;
      gap: 8px;
      -webkit-app-region: no-drag;
    }

    .dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      cursor: pointer;
      border: none;
      padding: 0;
      opacity: 0.85;
      transition: opacity 0.15s ease, transform 0.15s ease;
    }

    .dot:hover {
      opacity: 1;
      transform: scale(1.1);
    }

    .dot-close {
      background: #E24B4A;
    }

    .dot-min {
      background: #EF9F27;
    }

    .dot-max {
      background: #5DCAA5;
    }

    .titlebar-center {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 8px;
      pointer-events: none;
    }

    .titlebar-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.2);
      letter-spacing: 0.15em;
      text-transform: lowercase;
    }

    .titlebar-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.12);
    }

    .titlebar-right {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.18);
      letter-spacing: 0.05em;
      -webkit-app-region: no-drag;
    }

    .terminal-container {
      flex: 1;
      padding: 20px 24px 20px 24px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #terminal {
      flex: 1;
      overflow: hidden;
    }

    .xterm {
      height: 100%;
    }

    .xterm-viewport {
      background: transparent !important;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.08) transparent;
    }

    .xterm-screen {
      background: transparent !important;
    }

    .xterm-viewport::-webkit-scrollbar {
      width: 3px;
    }

    .xterm-viewport::-webkit-scrollbar-track {
      background: transparent;
    }

    .xterm-viewport::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 2px;
    }
  </style>
</head>

<body>
  <div class="window">
    <div class="titlebar">
      <div class="titlebar-left">
        <button class="dot dot-close" onclick="window.krit.closeWindow()"></button>
        <button class="dot dot-min" onclick="window.krit.minimize()"></button>
        <button class="dot dot-max" onclick="window.krit.maximize()"></button>
      </div>
      <div class="titlebar-center">
        <span class="titlebar-name">krit</span>
        <div class="titlebar-dot"></div>
        <span class="titlebar-name" id="cwd-display">~</span>
      </div>
      <span class="titlebar-right" id="clock"></span>
    </div>

    <div class="terminal-container">
      <div id="terminal"></div>
    </div>
  </div>

  <script src="../../node_modules/xterm/lib/xterm.js"></script>
  <script src="../../node_modules/xterm-addon-fit/lib/xterm-addon-fit.js"></script>
  <script src="renderer.js"></script>
</body>

</html>
