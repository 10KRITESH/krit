<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>krit</title>
    <link rel="stylesheet" href="../../node_modules/xterm/css/xterm.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            background: transparent;
            overflow: hidden;
            font-family: monospace;
        }

        .window {
            width: 100vw;
            height: 100vh;
            background: rgba(10, 14, 26, 0.55);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 0.5px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .titlebar {
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            -webkit-app-region: drag;
            flex-shrink: 0;
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.06);
        }

        .titlebar-left {
            display: flex;
            align-items: center;
            gap: 8px;
            -webkit-app-region: no-drag;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            cursor: pointer;
            border: none;
            padding: 0;
        }

        .dot-close {
            background: #E24B4A;
        }

        .dot-min {
            background: #EF9F27;
        }

        .dot-max {
            background: #5DCAA5;
        }

        .titlebar-title {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 0.05em;
        }

        .titlebar-right {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.2);
        }

        .terminal-container {
            flex: 1;
            padding: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #terminal {
            flex: 1;
            overflow: hidden;
        }

        .xterm {
            height: 100%;
        }

        .xterm-viewport {
            background: transparent !important;
        }

        .xterm-screen {
            background: transparent !important;
        }
    </style>
</head>

<body>
    <div class="window">

        <div class="titlebar">
            <div class="titlebar-left">
                <button class="dot dot-close" onclick="window.krit.minimize()"></button>
                <button class="dot dot-min" onclick="window.krit.minimize()"></button>
                <button class="dot dot-max" onclick="window.krit.maximize()"></button>
            </div>
            <span class="titlebar-title">krit</span>
            <span class="titlebar-right" id="clock"></span>
        </div>

        <div class="terminal-container">
            <div id="terminal"></div>
        </div>

    </div>

    <script src="../../node_modules/xterm/lib/xterm.js"></script>
    <script src="../../node_modules/xterm-addon-fit/lib/xterm-addon-fit.js"></script>
    <script src="renderer.js"></script>
</body>

</html>
